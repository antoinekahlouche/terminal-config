set-option -g base-index 1
set-option -g renumber-windows on
set-option -g detach-on-destroy off
set-option -g extended-keys on
set-option -g mouse on
set-option -as terminal-features ',xterm-ghostty:extkeys'

set-option -g status-style 'bg=default,fg=#5c6370'
set-option -g window-status-style 'bg=default,fg=#5c6370'
set-option -g window-status-current-style 'bg=#ffffff,fg=#282c34,bold'
set-option -g window-status-separator ' '
set-option -g window-status-format ' #I:#W '
set-option -g window-status-current-format ' #I:#W '
set-option -g status-format[0] '#{S:#{?#{==:#S,#{client_session}},#[fg=white]#[bg=default]#[noreverse],#[fg=#5c6370]#[bg=default]#[noreverse]}[#S]#[default] #{W:#[fg=#5c6370]#[bg=default]#[noreverse]#I:#W#[default] ,#{?#{==:#S,#{client_session}},#[fg=#282c34]#[bg=white]#[noreverse],#[fg=#5c6370]#[bg=default]#[noreverse]}#I:#W#[default] }}'

bind-key -n M-t new-window -c '#{pane_current_path}'
bind-key -n M-n new-session
bind-key -n M-r command-prompt -I '#S' -p 'Rename session:' 'rename-session "%%"'
bind-key -n M-Tab switch-client -n
bind-key -n M-Escape detach-client
bind-key -n M-w kill-window
bind-key -n M-q run-shell -bC 'if-shell -F "#{>:#{server_sessions},1}" "switch-client -c \"#{client_name}\" -n" ; kill-session -t "#{session_id}"'

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
